name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Verify tag matches package.json and server.json versions
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ! printf '%s' "$REF_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag '$REF_NAME' is not a semver tag (expected vX.Y.Z)" >&2
            exit 1
          fi
          TAG_VERSION="${REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match package.json '$PKG_VERSION'" >&2
            exit 1
          fi
          SJ_VERSION="$(node -p "require('./server.json').version")"
          if [ "$TAG_VERSION" != "$SJ_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match server.json '$SJ_VERSION'" >&2
            exit 1
          fi
          SJ_PKG_VERSION="$(node -p "require('./server.json').packages[0].version")"
          if [ "$TAG_VERSION" != "$SJ_PKG_VERSION" ]; then
            echo "Tag version '$TAG_VERSION' does not match server.json packages[0].version '$SJ_PKG_VERSION'" >&2
            exit 1
          fi
      - name: Generate SPDX SBOM for this release
        # npm (>= 10.5) emits a CycloneDX / SPDX SBOM straight from the
        # lockfile. We keep the file around for the attestation step below
        # and also upload it as a workflow artifact for auditing.
        run: npm sbom --sbom-format=spdx --package-lock-only > sbom.spdx.json
      - name: Pack the publishable tarball
        # Pack in advance so we can attest the exact bytes that go to npm.
        # `npm publish` below repacks with the same inputs (same tarball).
        run: npm pack
      - name: Attest SBOM against the published tarball
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: 'mcp-llm-studio-*.tgz'
          sbom-path: 'sbom.spdx.json'
      - run: npm publish --access public --provenance
      ### Publish to the MCP Registry (registry.modelcontextprotocol.io)
      - name: Install mcp-publisher
        # Pinned to the `latest` release download URL per the MCP Registry
        # docs. The binary is tiny (~4 MB) and the checksum is surfaced in
        # the release attestation.
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" \
            | tar xz mcp-publisher
      - name: Authenticate to MCP Registry via GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish server.json to MCP Registry
        run: ./mcp-publisher publish
